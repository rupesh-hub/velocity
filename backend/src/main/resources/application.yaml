spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

server:
  port: 8181

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
    info:
      access: read_only
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  info:
    env:
      enabled: true


application:
  cors:
    allowed-origins: ${ALLOWED_CORS_ORIGINS:http://localhost:4200}

info:
  app:
    name: VeloCity backend service
    version: "@project.version@"
    profile: ${spring.profiles.active}



