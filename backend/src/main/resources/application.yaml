spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  config:
    import:
      - "optional:application-production.yaml"
      - "optional:application-docker.yaml"

  sql:
    init:
      mode: always
      data-locations: classpath:data/data.sql
      schema-locations: classpath:data/schema.sql

  flyway:
    enabled: false  # Disabled for local H2 development

  datasource:
    url: jdbc:h2:mem:devops
    driverClassName: org.h2.Driver
    username: sh
    password:

  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8181

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
    info:
      access: read_only
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  info:
    env:
      enabled: true


application:
  cors:
    allowed-origins: ${ALLOWED_CORS_ORIGINS:http://localhost:4200}

info:
  app:
    name: VeloCity backend service
    version: "@project.version@"
    profile: ${spring.profiles.active}



