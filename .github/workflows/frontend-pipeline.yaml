name: frontend pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'docker/frontend/Dockerfile'
      - '.github/workflows/frontend-pipeline.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.extract_version.outputs.VERSION }}

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        run: |
          echo "VERSION=$(jq -r '.version' frontend/package.json)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: docker/frontend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-svc:${{ steps.extract_version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-svc:latest

  # 3️⃣ UPDATE GIT-OPS REPO
  update-deployments:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: rupesh-hub/event-chain-marketplace-gitops
          ref: main
          token: ${{ secrets.GIT_TOKEN }}
          path: deployment

      - name: Update compose image
        working-directory: deployment
        env:
          VERSION: ${{ needs.build.outputs.VERSION }}
          USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          COMPOSE_PATH="docker-compose/production/docker-compose.yaml"
          IMAGE_NAME="${USER}/ecm-frontend-svc:${VERSION}"

          echo "Updating image to ${IMAGE_NAME}"
          yq -i ".services.ecm-frontend-svc.image = \"$IMAGE_NAME\"" "$COMPOSE_PATH"

      - name: Commit & push update
        working-directory: deployment
        env:
          VERSION: ${{ needs.docker.outputs.VERSION }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git diff --staged --quiet || (
            git commit -m "chore(frontend): deploy ${VERSION} [skip ci]" &&
            git pull --rebase origin main &&
            git push origin main
          )