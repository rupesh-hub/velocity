name: Backend pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker/backend/Dockerfile'
      - '.github/workflows/backend-pipeline.yaml'

jobs:

  # 1️⃣ BUILD & TEST
  compile-test-build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: corretto
          cache: maven

      - name: Build with Maven
        run: |
          cd backend
          ./mvnw clean package -DskipTests


  # 2️⃣ DOCKER BUILD & PUSH
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: compile-test-build
    outputs:
      VERSION: ${{ steps.extract_version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        run: |
          cd backend
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: docker/backend/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            PROJECT_VERSION=${{ steps.extract_version.outputs.VERSION }}
            ACTIVE_PROFILE=production
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-svc:${{ steps.extract_version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-svc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


