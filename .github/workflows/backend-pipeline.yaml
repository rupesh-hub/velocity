name: Backend pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'docker/backend/Dockerfile'
      - '.github/workflows/backend-pipeline.yaml'

jobs:

  # 1️⃣ BUILD & TEST
  compile-test-build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build with Maven
        run: |
          cd backend
          ./mvnw clean package -DskipTests


  # 2️⃣ DOCKER BUILD & PUSH
  docker:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: compile-test-build
    outputs:
      VERSION: ${{ steps.extract_version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        run: |
          cd backend
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: docker/backend/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            PROJECT_VERSION=${{ steps.extract_version.outputs.VERSION }}
            ACTIVE_PROFILE=production
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-svc:${{ steps.extract_version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-svc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # 3️⃣ UPDATE GIT-OPS REPO
  update-deployments:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: rupesh-hub/velocity-gitops
          ref: main
          token: ${{ secrets.GIT_TOKEN }}
          path: deployment

      - name: Update compose image
        working-directory: deployment
        env:
          VERSION: ${{ needs.docker.outputs.VERSION }}
          USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          COMPOSE_PATH="docker-compose/production/docker-compose.yaml"
          COMPOSE_PATH_DEFAULT="docker-compose/default/docker-compose.yaml"
          IMAGE_NAME="${USER}/backend-svc:${VERSION}"
          
          echo "Updating image to ${IMAGE_NAME}"
          yq -i ".services.backend-svc.image = \"$IMAGE_NAME\"" "$COMPOSE_PATH"
          yq -i ".services.backend-svc.image = \"$IMAGE_NAME\"" "$COMPOSE_PATH_DEFAULT"

      - name: Commit & push update
        working-directory: deployment
        env:
          VERSION: ${{ needs.docker.outputs.VERSION }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add .
          git diff --staged --quiet || (
            git commit -m "chore(backend): deploy ${VERSION} [skip ci]" &&
            git pull --rebase origin main &&
            git push origin main
          )

    # 4️⃣ DEPLOY TO G-CLOUD
    deployment:
      name: Deploy to VPS
      runs-on: ubuntu-latest
      needs: update-deployments

      steps:
        - name: Checkout GitOps repository
          uses: actions/checkout@v4
          with:
            repository: rupesh-hub/velocity-gitops
            ref: main
            token: ${{ secrets.GIT_TOKEN }}

        - name: Setup SSH
          uses: webfactory/ssh-agent@v0.9.0
          with:
            ssh-private-key: ${{ secrets.SSH_TOKEN }}

        - name: Create deployment folder
          run: |
            ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} "mkdir -p velocity"

        - name: Copy docker compose files
          run: |
            scp -o StrictHostKeyChecking=no \
              docker-compose/production/docker-compose.yaml \
              docker-compose/production/common-config.yaml \
              ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }}:~/velocity/

        - name: Create .env file
          run: |
            ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} "cat > velocity/.env <<EOL
            ALLOWED_CORS_ORIGINS=${{ secrets.ALLOWED_CORS_ORIGINS }}
            SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILES_ACTIVE }}
            EOL"

        - name: Deploy containers
          run: |
            ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} "
              cd velocity &&
              echo 'Stopping existing containers...' &&
              docker compose down &&
              echo 'Pulling latest images...' &&
              docker compose pull &&
              echo 'Starting new containers...' &&
              docker compose up -d --remove-orphans &&
              echo 'Cleaning old images...' &&
              docker image prune -f
            "

